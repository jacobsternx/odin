<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="./css/styles.css">
    <title>Odin Foundations</title>
</head>
<body> 
    
        <!--From earlier lesson-->
    <a href="https://google.com">Google</a>
    <img src="https://www.theodinproject.com/mstile-310x310.png" alt="test image">

    <!--From earlier lesson-->
    <div class="main">
        <div class="subsection", "list">
        </div>
    </div>

    <div id="title">My Awesome 90's Page</div>

    <!--Type selector selects all elements with a given element type, and syntax is it's name-->
    <div>Hello, World!</div>
    <div>Hello again!</div>
    <p>Hi...</p>
    <div>Okay, bye.</div>

    <!--Class selector selects all elements with a given class-->
    <div class="alert-text">
        Please agree to our terms of service.
    </div>

    /* Grouping selectors */

    <!--Chaining selectors-->
    <div>
        <div class="subsection header">Latest Posts</div>
        <p class="subsection" id="preview">This is where a preview for a post might go.</p>
    </div>

    <!--Descendant combinator-->
    .ancestor .contents {
        /* some declarations */
      }
      
</body>
</html>
